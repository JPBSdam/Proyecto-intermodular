name: app_restaurante
description: "SabrosApp"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  json_annotation: ^4.9.0
  firebase_core: ^4.3.0
  go_router: ^17.0.1
  intl: ^0.20.2
  firebase_storage: ^13.3.0
  image_picker: ^1.1.0
  cloud_firestore: ^6.1.2
  provider: ^6.1.5+1
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.2
  flutter_svg: ^2.0.17
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2
  firebase_messaging: ^16.1.1
  # Paquete HTTP para llamar a la API REST de EmailJS (emails gratuitos sin servidor)
  http: ^1.2.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.15.0
  json_serializable: ^6.11.1
  fake_cloud_firestore: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  mockito: ^5.6.4
  firebase_auth_mocks: ^0.15.1
  mock_exceptions: ^0.8.2

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  macos:
    generate: true
    image_path: "assets/icon_source.png"
  web:
    generate: true
    image_path: "assets/icon_source.png"
  image_path: "assets/icon_source.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/
